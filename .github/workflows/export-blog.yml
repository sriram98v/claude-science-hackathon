name: Export blog content

# Action A of the two-stage blog pipeline.
#
# Regenerates the portable blog contract (blog/content.md + blog/media/ + blog/full.html)
# from the already-executed notebook and commits it to main -- but ONLY after a test
# gate confirms every notebook cell actually produced output. No GPU / torch / project
# env: the notebook ships executed, so this just reads it.
#
# After committing it dispatches Action B (deploy-web); a commit made with the default
# GITHUB_TOKEN does not itself trigger other workflows, so we kick it off explicitly.

on:
  push:
    branches: [main]
    paths:
      - antigenic_study.ipynb
      - export_blog.py
      - tests/test_notebook_outputs.py
      - .github/workflows/export-blog.yml
  workflow_dispatch:

permissions:
  contents: write   # commit regenerated blog/ back to main
  actions: write    # dispatch deploy-web.yml

concurrency:
  group: export-blog
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Slim render/test deps only -- nbconvert 7.16.6+ required for mistune 3.1+.
      - name: Install export dependencies
        run: python -m pip install --upgrade "nbconvert>=7.16.6" nbformat pytest

      - name: Test gate -- every cell produced output
        run: python -m pytest tests/test_notebook_outputs.py -q

      - name: Export blog content
        run: python export_blog.py

      - name: Commit regenerated blog content
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/content.md blog/media blog/full.html
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No blog changes to commit."
          else
            git commit -m "chore: regenerate blog content from notebook"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger web deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-web.yml --ref main
