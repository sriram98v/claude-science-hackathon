name: Build and deploy blog

# Single-stage pipeline. Builds the Zola site straight from the executed notebook and
# publishes the static output to the `web` branch (the GitHub Pages source).
#
# It commits NOTHING back to main: blog/ (the portable contract) is regenerated in the
# workspace during the run and consumed in-place, so main stays strictly human-authored
# and CI never causes main to diverge from your local. The committed blog/ in main is a
# convenience snapshot only -- CI does not read or rewrite it.
#
# Needs both the slim render deps (nbconvert/nbformat, to read the executed notebook) and
# zola (to build). No GPU / torch / science env -- the notebook ships executed.

on:
  push:
    branches: [main]
    paths:
      - antigenic_study.ipynb
      - export_blog.py
      - assemble_site.py
      - tests/test_notebook_outputs.py
      - site/**
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

permissions:
  contents: write   # push the built site to the web branch

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Slim render/test deps only -- nbconvert 7.16.6+ required for mistune 3.1+.
      - name: Install export/test dependencies
        run: python -m pip install --upgrade "nbconvert>=7.16.6" nbformat pytest

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      # Gate: fail loudly if any notebook cell emitted nothing / an error, so the built
      # blog can't silently lose a figure or table.
      - name: Test gate -- every notebook cell produced output
        run: python -m pytest tests/test_notebook_outputs.py -q

      - name: Regenerate the blog contract from the notebook
        run: python export_blog.py

      - name: Assemble site inputs from blog/ (md + media only)
        run: python assemble_site.py

      - name: Build site
        run: zola build
        working-directory: site

      - name: Publish to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/public
          publish_branch: web
          force_orphan: true
